<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>€u Falo de Dinheiro! — Podcast de Literacia Financeira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.8;
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Episode Destaque */
        .episodio-destaque {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .episodio-destaque h2 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .destaque-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            align-items: center;
        }

        .destaque-content img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .destaque-info h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .destaque-info p {
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .btn-play-grande {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 1rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 1rem;
            transition: transform 0.3s;
        }

        .btn-play-grande:hover {
            transform: scale(1.05);
        }

        /* Episodios Grid */
        .episodios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .episodio-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .episodio-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .episodio-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .episodio-info {
            padding: 1.5rem;
        }

        .episodio-data {
            color: #667eea;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .episodio-info h3 {
            font-size: 1.2rem;
            margin: 0.5rem 0;
            color: #333;
        }

        .autor {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .duracao {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .descricao {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .episodio-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-play, .btn-detalhes {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-play {
            background: #667eea;
            color: white;
        }

        .btn-play:hover {
            background: #5568d3;
        }

        .btn-detalhes {
            background: #333;
            color: white;
        }

        .btn-detalhes:hover {
            background: #555;
        }

        /* Paginação */
        .paginacao {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            padding: 2rem;
            flex-wrap: wrap;
        }

        .paginacao a {
            padding: 0.75rem 1.25rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .paginacao a:hover {
            background: #5568d3;
        }

        .paginacao a.ativo {
            background: #764ba2;
            font-weight: bold;
        }

        .paginacao a.disabled {
            background: #ccc;
            pointer-events: none;
        }

        /* Newsletter */
        .newsletter {
            background: white;
            padding: 3rem 2rem;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 3rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .newsletter h2 {
            margin-bottom: 1rem;
            color: #667eea;
        }

        .newsletter-form {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .newsletter-form input {
            padding: 0.75rem 1.5rem;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            width: 300px;
        }

        .newsletter-form button {
            padding: 0.75rem 2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .newsletter-form button:hover {
            background: #5568d3;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 2rem;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }

            nav ul {
                gap: 1rem;
            }

            .destaque-content {
                grid-template-columns: 1fr;
            }

            .episodios-grid {
                grid-template-columns: 1fr;
            }

            .newsletter-form input {
                width: 100%;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">€u Falo de Dinheiro!</a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">O Projeto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Episode Destaque (último episódio) -->
        <section id="destaque-container"></section>

        <!-- Lista de Episódios -->
        <h2 style="margin-bottom: 2rem; color: #333;">Últimos Podcasts</h2>
        <section id="episodios-container" class="episodios-grid">
            <div class="loading">Carregando episódios...</div>
        </section>

        <!-- Paginação -->
        <nav id="paginacao-container" class="paginacao"></nav>

        <!-- Newsletter -->
        <section class="newsletter">
            <h2>Subscrever</h2>
            <p>Esteja a par dos últimos episódios, informações e novidades.</p>
            <form class="newsletter-form">
                <input type="email" placeholder="O seu email" required>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>Copyright © €u Falo de Dinheiro | Template original por <a href="https://colorlib.com" target="_blank">Colorlib</a></p>
    </footer>

    <!-- Scripts -->
    <script src="episodios.js"></script>
    <script>
        // Configuração
        const episodiosPorPagina = 6;
        let paginaAtual = 1;

        // Ordenar episódios por ID descendente (mais recente primeiro)
        const episodiosOrdenados = [...episodios].sort((a, b) => b.id - a.id);

        // Elementos do DOM
        const containerDestaque = document.getElementById('destaque-container');
        const containerEpisodios = document.getElementById('episodios-container');
        const containerPaginacao = document.getElementById('paginacao-container');

        // Função para renderizar o episódio em destaque
        function renderizarDestaque() {
            const ultimoEpisodio = episodiosOrdenados[0]; // Episódio 11
            
            containerDestaque.innerHTML = `
                <section class="episodio-destaque">
                    <h2>🎙️ Último Episódio</h2>
                    <div class="destaque-content">
                        <img src="${ultimoEpisodio.imagem}" alt="${ultimoEpisodio.titulo}" onerror="this.src='https://via.placeholder.com/300x300?text=Podcast'">
                        <div class="destaque-info">
                            <h3>${ultimoEpisodio.titulo}</h3>
                            <p><strong>Autor:</strong> ${ultimoEpisodio.autor}</p>
                            <p><strong>Data:</strong> ${ultimoEpisodio.data}</p>
                            <p><strong>Duração:</strong> ${ultimoEpisodio.duracao}</p>
                            <p>${ultimoEpisodio.descricao.substring(0, 200)}...</p>
                            <a href="${ultimoEpisodio.audio}" class="btn-play-grande" target="_blank">▶ Ouvir Agora</a>
                        </div>
                    </div>
                </section>
            `;
        }

        // Função para renderizar episódios
        function renderizarEpisodios(pagina) {
            const inicio = (pagina - 1) * episodiosPorPagina;
            const fim = inicio + episodiosPorPagina;
            const episodiosPagina = episodiosOrdenados.slice(inicio, fim);
            
            // Limpar conteúdo anterior
            containerEpisodios.innerHTML = '';
            
            // Criar cards dos episódios
            episodiosPagina.forEach((ep) => {
                const card = document.createElement('article');
                card.className = 'episodio-card';
                card.innerHTML = `
                    <img src="${ep.imagem}" alt="${ep.titulo}" onerror="this.src='https://via.placeholder.com/350x200?text=Episodio+${ep.id}'">
                    <div class="episodio-info">
                        <span class="episodio-data">${ep.data}</span>
                        <h3>${ep.titulo}</h3>
                        <p class="autor">👤 ${ep.autor}</p>
                        <p class="duracao">⏱ ${ep.duracao}</p>
                        <p class="descricao">${ep.descricao.substring(0, 150)}...</p>
                        <div class="episodio-actions">
                            <a href="${ep.audio}" class="btn-play" target="_blank">▶ Ouvir</a>
                            <a href="episodio.html?id=${ep.id}" class="btn-detalhes">Ver Detalhes</a>
                        </div>
                    </div>
                `;
                
                containerEpisodios.appendChild(card);
            });
            
            // Atualizar paginação
            atualizarPaginacao();
        }

        // Função para atualizar controles de paginação
        function atualizarPaginacao() {
            const totalPaginas = Math.ceil(episodiosOrdenados.length / episodiosPorPagina);
            
            containerPaginacao.innerHTML = '';
            
            // Botão anterior
            const btnAnterior = document.createElement('a');
            btnAnterior.href = '#';
            btnAnterior.textContent = '<';
            btnAnterior.className = paginaAtual === 1 ? 'disabled' : '';
            btnAnterior.onclick = (e) => {
                e.preventDefault();
                if (paginaAtual > 1) {
                    paginaAtual--;
                    renderizarEpisodios(paginaAtual);
                    window.scrollTo(0, 0);
                }
            };
            containerPaginacao.appendChild(btnAnterior);
            
            // Números das páginas
            for (let i = 1; i <= totalPaginas; i++) {
                const btnPagina = document.createElement('a');
                btnPagina.href = '#';
                btnPagina.textContent = i;
                btnPagina.className = i === paginaAtual ? 'ativo' : '';
                btnPagina.onclick = (e) => {
                    e.preventDefault();
                    paginaAtual = i;
                    renderizarEpisodios(paginaAtual);
                    window.scrollTo(0, 0);
                };
                containerPaginacao.appendChild(btnPagina);
            }
            
            // Botão seguinte
            const btnSeguinte = document.createElement('a');
            btnSeguinte.href = '#';
            btnSeguinte.textContent = '>';
            btnSeguinte.className = paginaAtual === totalPaginas ? 'disabled' : '';
            btnSeguinte.onclick = (e) => {
                e.preventDefault();
                if (paginaAtual < totalPaginas) {
                    paginaAtual++;
                    renderizarEpisodios(paginaAtual);
                    window.scrollTo(0, 0);
                }
            };
            containerPaginacao.appendChild(btnSeguinte);
        }

        // Inicializar quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', () => {
            renderizarDestaque();
            renderizarEpisodios(paginaAtual);
        });
    </script>
</body>
</html>
