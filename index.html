<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>€u Falo de Dinheiro! — Podcast de Literacia Financeira</title>
    
    <!-- CSS do Template -->
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="aos.css">
    <link rel="stylesheet" href="owl.theme.default.min.css">
    <link rel="stylesheet" href="mediaelementplayer.css">
    
    <style>
        /* Estilos específicos para os episódios */
        .episodio-destaque-section {
            background: linear-gradient(135deg, #f23a2e 0%, #c7180c 100%);
            color: #fff;
            padding: 4rem 0;
            margin-bottom: 3rem;
        }

        .episodio-destaque-section h2 {
            color: #fff;
            margin-bottom: 2rem;
        }

        .destaque-content {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
        }

        .destaque-content img {
            max-width: 300px;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .destaque-info h3 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .destaque-info p {
            color: rgba(255,255,255,0.9);
            margin-bottom: 0.5rem;
        }

        .btn-play-destaque {
            display: inline-block;
            background: #fff;
            color: #f23a2e;
            padding: 1rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-play-destaque:hover {
            background: #f8f9fa;
            transform: scale(1.05);
            color: #f23a2e;
        }

        /* Grid de episódios */
        .episodios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .podcast-entry {
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 5px 40px -10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .podcast-entry:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px -5px rgba(0, 0, 0, 0.2);
        }

        .podcast-entry .image {
            background-size: cover;
            background-position: center center;
            height: 250px;
        }

        .podcast-entry .text {
            padding: 2rem;
        }

        .podcast-entry .text h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #25262a;
        }

        .podcast-entry .text .meta {
            color: #f23a2e;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .podcast-entry .text p {
            color: #4d4d4d;
            margin-bottom: 1rem;
        }

        .podcast-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-ouvir {
            background: #f23a2e;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-ouvir:hover {
            background: #c7180c;
            color: #fff;
        }

        .btn-detalhes {
            background: #343a40;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-detalhes:hover {
            background: #23272b;
            color: #fff;
        }

        /* Paginação */
        .paginacao-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            padding: 2rem 0;
            flex-wrap: wrap;
        }

        .paginacao-container a {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
            border: 1px solid #ccc;
            color: #f23a2e;
            text-decoration: none;
            transition: all 0.3s;
        }

        .paginacao-container a:hover,
        .paginacao-container a.ativo {
            background: #f23a2e;
            color: #fff;
            border-color: #f23a2e;
        }

        .paginacao-container a.disabled {
            color: #ccc;
            pointer-events: none;
        }

        /* Newsletter */
        .site-block-subscribe {
            background: #f8f9fa;
            padding: 3rem 2rem;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 3rem;
        }

        .site-block-subscribe h2 {
            color: #25262a;
            margin-bottom: 1rem;
        }

        .site-block-subscribe .form-control {
            max-width: 400px;
            margin: 0 auto;
            display: block;
        }

        .site-block-subscribe .btn {
            margin-top: 1rem;
        }

        /* Loading */
        .loading-episodios {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .episodios-grid {
                grid-template-columns: 1fr;
            }

            .destaque-content {
                flex-direction: column;
                text-align: center;
            }

            .destaque-content img {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <div class="site-navbar">
        <nav class="site-navigation">
            <div class="container">
                <div class="site-logo">
                    <a href="index.html">€u Falo de Dinheiro!</a>
                </div>
                <ul class="site-menu">
                    <li class="active"><a href="index.html">Home</a></li>
                    <li><a href="about.html">O Projeto</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="site-wrap">
        
        <!-- Episode Destaque -->
        <section id="destaque-container" class="episodio-destaque-section">
            <div class="container">
                <div class="row">
                    <div class="col-12 text-center">
                        <h2>🎙️ Último Episódio</h2>
                    </div>
                </div>
                <div id="destaque-content" class="destaque-content">
                    <p class="loading-episodios">Carregando episódio em destaque...</p>
                </div>
            </div>
        </section>

        <!-- Lista de Episódios -->
        <section class="site-section">
            <div class="container">
                <div class="row mb-5">
                    <div class="col-12 text-center">
                        <h2 class="site-section-heading text-center">Últimos Podcasts</h2>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <div id="episodios-container" class="episodios-grid">
                            <p class="loading-episodios">Carregando episódios...</p>
                        </div>
                    </div>
                </div>

                <!-- Paginação -->
                <div class="row">
                    <div class="col-12">
                        <nav id="paginacao-container" class="paginacao-container"></nav>
                    </div>
                </div>
            </div>
        </section>

        <!-- Newsletter -->
        <section class="site-block-subscribe">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 mx-auto text-center">
                        <h2>Subscrever</h2>
                        <p>Esteja a par dos últimos episódios, informações e novidades.</p>
                        <form class="site-block-subscribe-form">
                            <input type="email" class="form-control" placeholder="O seu email" required>
                            <button type="submit" class="btn btn-primary">Enviar</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <div class="row">
                <div class="col-12 text-center">
                    <p>Copyright © €u Falo de Dinheiro | Template original por <a href="https://colorlib.com" target="_blank">Colorlib</a></p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="episodios.js"></script>
    <script>
        // Configuração
        const episodiosPorPagina = 5;
        let paginaAtual = 1;

        // Ordenar episódios por ID descendente (mais recente primeiro)
        const episodiosOrdenados = [...episodios].sort((a, b) => b.id - a.id);

        // Elementos do DOM
        const containerDestaque = document.getElementById('destaque-content');
        const containerEpisodios = document.getElementById('episodios-container');
        const containerPaginacao = document.getElementById('paginacao-container');

        // Função para renderizar o episódio em destaque
        function renderizarDestaque() {
            const ultimoEpisodio = episodiosOrdenados[0];
            
            containerDestaque.innerHTML = `
                <div class="col-md-4">
                    <img src="${ultimoEpisodio.imagem}" alt="${ultimoEpisodio.titulo}" onerror="this.src='https://via.placeholder.com/300x300?text=Episodio+${ultimoEpisodio.id}'">
                </div>
                <div class="col-md-8 destaque-info">
                    <h3>${ultimoEpisodio.titulo}</h3>
                    <p><strong>👤 Autor:</strong> ${ultimoEpisodio.autor}</p>
                    <p><strong>📅 Data:</strong> ${ultimoEpisodio.data}</p>
                    <p><strong>⏱ Duração:</strong> ${ultimoEpisodio.duracao}</p>
                    <p>${ultimoEpisodio.descricao.substring(0, 250)}...</p>
                    <a href="${ultimoEpisodio.audio}" class="btn-play-destaque" target="_blank">▶ Ouvir Agora</a>
                </div>
            `;
        }

        // Função para renderizar episódios
        function renderizarEpisodios(pagina) {
            const inicio = (pagina - 1) * episodiosPorPagina + 1;
            const fim = inicio + episodiosPorPagina;
            const episodiosPagina = episodiosOrdenados.slice(inicio, fim);
            
            containerEpisodios.innerHTML = '';
            
            episodiosPagina.forEach((ep) => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4 mb-4';
                col.innerHTML = `
                    <div class="podcast-entry">
                        <div class="image" style="background-image: url('${ep.imagem}');"></div>
                        <div class="text">
                            <span class="meta">📅 ${ep.data} | ⏱ ${ep.duracao}</span>
                            <h3>${ep.titulo}</h3>
                            <p class="mb-3">👤 ${ep.autor}</p>
                            <p>${ep.descricao.substring(0, 120)}...</p>
                            <div class="podcast-actions">
                                <a href="${ep.audio}" class="btn-ouvir" target="_blank">▶ Ouvir</a>
                                <a href="episodio.html?id=${ep.id}" class="btn-detalhes">Ver Detalhes</a>
                            </div>
                        </div>
                    </div>
                `;
                containerEpisodios.appendChild(col);
            });
            
            atualizarPaginacao();
        }

        // Função para atualizar paginação
        function atualizarPaginacao() {
            const totalEpisodiosParaLista = episodiosOrdenados.length - 1;
            const totalPaginas = Math.ceil(totalEpisodiosParaLista / episodiosPorPagina);
            
            containerPaginacao.innerHTML = '';
            
            // Botão anterior
            const btnAnterior = document.createElement('a');
            btnAnterior.href = '#';
            btnAnterior.textContent = '<';
            btnAnterior.className = paginaAtual === 1 ? 'disabled' : '';
            btnAnterior.onclick = (e) => {
                e.preventDefault();
                if (paginaAtual > 1) {
                    paginaAtual--;
                    renderizarEpisodios(paginaAtual);
                    window.scrollTo(0, 0);
                }
            };
            containerPaginacao.appendChild(btnAnterior);
            
            // Números das páginas
            for (let i = 1; i <= totalPaginas; i++) {
                const btnPagina = document.createElement('a');
                btnPagina.href = '#';
                btnPagina.textContent = i;
                btnPagina.className = i === paginaAtual ? 'ativo' : '';
                btnPagina.onclick = (e) => {
                    e.preventDefault();
                    paginaAtual = i;
                    renderizarEpisodios(paginaAtual);
                    window.scrollTo(0, 0);
                };
                containerPaginacao.appendChild(btnPagina);
            }
            
            // Botão seguinte
            const btnSeguinte = document.createElement('a');
            btnSeguinte.href = '#';
            btnSeguinte.textContent = '>';
            btnSeguinte.className = paginaAtual === totalPaginas ? 'disabled' : '';
            btnSeguinte.onclick = (e) => {
                e.preventDefault();
                if (paginaAtual < totalPaginas) {
                    paginaAtual++;
                    renderizarEpisodios(paginaAtual);
                    window.scrollTo(0, 0);
                }
            };
            containerPaginacao.appendChild(btnSeguinte);
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            renderizarDestaque();
            renderizarEpisodios(paginaAtual);
        });

        // Fallback
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            renderizarDestaque();
            renderizarEpisodios(paginaAtual);
        }
    </script>
</body>
</html>
