  <script>
    const episodiosPorPagina = 6;
    let paginaAtual = 1;
    const episodiosOrdenados = [...episodios].sort((a, b) => b.id - a.id);

    const containerEpisodios = document.getElementById('lista-episodios');
    const paginacaoUl = document.getElementById('paginacao-episodios');

    function renderizarEpisodios(pagina) {
      if (!containerEpisodios) return;

      const inicio = (pagina - 1) * episodiosPorPagina;
      const fim = inicio + episodiosPorPagina;
      const episodiosPagina = episodiosOrdenados.slice(inicio, fim);

      containerEpisodios.innerHTML = '';

      episodiosPagina.forEach(ep => {
        const html = `
          <div class="d-block d-md-flex podcast-entry bg-white mb-5" data-aos="fade-up">
            <div class="image" style="background-image: url('${ep.imagem}');"></div>
            <div class="text">
              <h3 class="font-weight-light">
                <a href="episodio.html?id=${ep.id}" class="text-dark">${ep.titulo}</a>
              </h3>
              <div class="text-white mb-3">
                <span class="text-black-opacity-05">
                  <small>Por ${ep.autor} <span class="sep">/</span> ${ep.data} <span class="sep">/</span> ${ep.duracao}</small>
                </span>
              </div>
              <p class="mb-4">${ep.descricao}</p>
            </div>
          </div>
        `;
        containerEpisodios.insertAdjacentHTML('beforeend', html);
      });

      atualizarPaginacao();
    }

    function atualizarPaginacao() {
      if (!paginacaoUl) return;

      const totalPaginas = Math.ceil(episodiosOrdenados.length / episodiosPorPagina);
      paginacaoUl.innerHTML = '';

      const liPrev = document.createElement('li');
      const aPrev = document.createElement('a');
      aPrev.href = "#";
      aPrev.textContent = '<';
      if (paginaAtual === 1) {
        aPrev.classList.add('disabled');
      }
      aPrev.onclick = function (e) {
        e.preventDefault();
        if (paginaAtual > 1) {
          paginaAtual--;
          renderizarEpisodios(paginaAtual);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
      liPrev.appendChild(aPrev);
      paginacaoUl.appendChild(liPrev);

      for (let i = 1; i <= totalPaginas; i++) {
        const li = document.createElement('li');
        if (i === paginaAtual) {
          const span = document.createElement('span');
          span.textContent = i;
          li.appendChild(span);
        } else {
          const a = document.createElement('a');
          a.href = "#";
          a.textContent = i;
          a.onclick = function (e) {
            e.preventDefault();
            paginaAtual = i;
            renderizarEpisodios(paginaAtual);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };
          li.appendChild(a);
        }
        paginacaoUl.appendChild(li);
      }

      const liNext = document.createElement('li');
      const aNext = document.createElement('a');
      aNext.href = "#";
      aNext.textContent = '>';
      const totalPaginasCalc = Math.ceil(episodiosOrdenados.length / episodiosPorPagina);
      if (paginaAtual === totalPaginasCalc) {
        aNext.classList.add('disabled');
      }
      aNext.onclick = function (e) {
        e.preventDefault();
        if (paginaAtual < totalPaginasCalc) {
          paginaAtual++;
          renderizarEpisodios(paginaAtual);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
      liNext.appendChild(aNext);
      paginacaoUl.appendChild(liNext);
    }

    function carregarEpisodioDestaque() {
      const ultimoEpisodio = episodiosOrdenados[0];
      if (!ultimoEpisodio) return;

      const tituloEl = document.getElementById('destaque-titulo');
      const metaEl = document.getElementById('destaque-meta');
      const descEl = document.getElementById('destaque-descricao');

      if (tituloEl) {
        tituloEl.innerHTML = `<a href="episodio.html?id=${ultimoEpisodio.id}" class="text-white">${ultimoEpisodio.titulo}</a>`;
      }
      if (metaEl) {
        metaEl.innerHTML = `<span class="text-white-opacity-05"><small>Por ${ultimoEpisodio.autor} <span class="sep">/</span> ${ultimoEpisodio.data} <span class="sep">/</span> ${ultimoEpisodio.duracao}</small></span>`;
      }
      if (descEl) {
        descEl.textContent = ultimoEpisodio.descricao;
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      carregarEpisodioDestaque();
      renderizarEpisodios(paginaAtual);
    });
  </script>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>
    window.onTurnstileSuccess = function(token) {
      if (window._currentForm) {
        submitEmail(window._currentForm, token);
      }
    };

    function handleSubscribeClick(emailId, messageId) {
      const input = document.getElementById(emailId);
      if (!input) return;
      const email = input.value.trim();

      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById(messageId).innerHTML = '<span style="color: #ffffff;">Por favor, insira um email válido.</span>';
        return;
      }

      window._currentForm = { emailId, email, messageId };

      const form = input.closest('form');
      const turnstileWidget = form.querySelector('.cf-turnstile');
      if (turnstileWidget && window.turnstile) {
        window.turnstile.reset(turnstileWidget);
        window.turnstile.execute(turnstileWidget);
      } else {
        document.getElementById(messageId).innerHTML = '<span style="color: #dc3545;">Erro ao iniciar verificação.</span>';
      }
    }

    async function submitEmail(formData, token) {
      const { email, messageId, emailId } = formData;
      try {
        const response = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token })
        });

        let result = {};
        try { result = await response.json(); } catch {}

        if (response.ok) {
          document.getElementById(messageId).innerHTML = '<span style="color: #ffffff;">Obrigado pela subscrição!</span>';
          const input = document.getElementById(emailId);
          if (input) input.value = '';
        } else {
          const errorMsg = result.details ? result.details.join(', ') : (result.error || 'Tente novamente mais tarde.');
          document.getElementById(messageId).innerHTML = `<span style="color: #dc3545;">Erro: ${errorMsg}</span>`;
        }
      } catch (err) {
        document.getElementById(messageId).innerHTML = '<span style="color: #dc3545;">Erro de ligação. Tente novamente.</span>';
      } finally {
        window._currentForm = null;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const btn1 = document.getElementById('subscribe-btn-1');
      if (btn1) btn1.addEventListener('click', () => handleSubscribeClick('subscribe-email-1', 'subscribe-message-1'));

      const email1 = document.getElementById('subscribe-email-1');
      if (email1) email1.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSubscribeClick('subscribe-email-1', 'subscribe-message-1');
        }
      });
    });
  </script>
