    function carregarEpisodiosRecentes() {
      const container = document.getElementById('lista-episodios');
      if (!container) return;
      let html = '';
      const episodiosRecentes = episodios.slice(0, 5);
      episodiosRecentes.forEach(ep => {
        html += `
          <div class="d-block d-md-flex podcast-entry bg-white mb-5" data-aos="fade-up">
            <div class="image" style="background-image: url('${ep.imagem}');"></div>
            <div class="text">
              <h3 class="font-weight-light"><a href="episodio.html?id=${ep.id}" class="text-dark">${ep.titulo}</a></h3>
              <div class="text-white mb-3"><span class="text-black-opacity-05"><small>Por ${ep.autor} <span class="sep">/</span> ${ep.data} <span class="sep">/</span> ${ep.duracao}</small></span></div>
              <p class="mb-4">${ep.descricao}</p>
            </div>
          </div>`;
      });
      container.innerHTML = html;
    }

    function carregarEpisodioDestaque() {
      const ultimoEpisodio = episodios[episodios.length - 1];
      document.getElementById('destaque-titulo').innerHTML = `<a href="episodio.html?id=${ultimoEpisodio.id}" class="text-white">${ultimoEpisodio.titulo}</a>`;
      document.getElementById('destaque-meta').innerHTML = `<span class="text-white-opacity-05"><small>Por ${ultimoEpisodio.autor} <span class="sep">/</span> ${ultimoEpisodio.data} <span class="sep">/</span> ${ultimoEpisodio.duracao}</small></span>`;
      document.getElementById('destaque-descricao').textContent = ultimoEpisodio.descricao;
    }
  </script>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>
    window.onTurnstileSuccess = function(token) {
      if (window._currentForm) {
        submitEmail(window._currentForm, token);
      }
    };

    function handleSubscribeClick(emailId, messageId) {
      const input = document.getElementById(emailId);
      if (!input) return;
      const email = input.value.trim();

      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById(messageId).innerHTML = '<span style="color: #ffffff;">Por favor, insira um email válido.</span>';
        return;
      }

      window._currentForm = { emailId, email, messageId };

      const form = input.closest('form');
      const turnstileWidget = form.querySelector('.cf-turnstile');
      if (turnstileWidget && window.turnstile) {
        window.turnstile.reset(turnstileWidget);   // ← CORREÇÃO PRINCIPAL
        window.turnstile.execute(turnstileWidget);
      } else {
        document.getElementById(messageId).innerHTML = '<span style="color: #dc3545;">Erro ao iniciar verificação.</span>';
      }
    }

    async function submitEmail(formData, token) {
      const { email, messageId, emailId } = formData;
      try {
        const response = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token })
        });

        let result = {};
        try { result = await response.json(); } catch {}

        if (response.ok) {
          document.getElementById(messageId).innerHTML = '<span style="color: #ffffff;">Obrigado pela subscrição!</span>';
          const input = document.getElementById(emailId);
          if (input) input.value = '';
        } else {
          const errorMsg = result.details ? result.details.join(', ') : (result.error || 'Tente novamente mais tarde.');
          document.getElementById(messageId).innerHTML = `<span style="color: #dc3545;">Erro: ${errorMsg}</span>`;
        }
      } catch (err) {
        document.getElementById(messageId).innerHTML = '<span style="color: #dc3545;">Erro de ligação. Tente novamente.</span>';
      } finally {
        window._currentForm = null;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const btn1 = document.getElementById('subscribe-btn-1');
      if (btn1) btn1.addEventListener('click', () => handleSubscribeClick('subscribe-email-1', 'subscribe-message-1'));

      const btn2 = document.getElementById('subscribe-btn-2');
      if (btn2) btn2.addEventListener('click', () => handleSubscribeClick('subscribe-email-2', 'subscribe-message-2'));

      const email1 = document.getElementById('subscribe-email-1');
      if (email1) email1.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); handleSubscribeClick('subscribe-email-1', 'subscribe-message-1'); } });

      const email2 = document.getElementById('subscribe-email-2');
      if (email2) email2.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); handleSubscribeClick('subscribe-email-2', 'subscribe-message-2'); } });
    });
  </script>

<script src="episodios.js"></script>
<script>
// Configuração
const episodiosPorPagina = 6;
let paginaAtual = 1;

// Ordenar episódios por ID descendente (mais recente primeiro)
const episodiosOrdenados = [...episodios].sort((a, b) => b.id - a.id);

// Elementos do DOM
const containerEpisodios = document.querySelector('.episodios-grid') || document.querySelector('main');
const paginacao = document.querySelector('.paginacao');

// Função para renderizar episódios
function renderizarEpisodios(pagina) {
    const inicio = (pagina - 1) * episodiosPorPagina;
    const fim = inicio + episodiosPorPagina;
    const episodiosPagina = episodiosOrdenados.slice(inicio, fim);
    
    // Limpar conteúdo anterior
    if (containerEpisodios) {
        containerEpisodios.innerHTML = '';
    }
    
    // Criar cards dos episódios
    episodiosPagina.forEach((ep, index) => {
        const isDestaque = pagina === 1 && index === 0; // Primeiro episódio da primeira página é destaque
        
        const card = document.createElement('article');
        card.className = `episodio-card ${isDestaque ? 'destaque' : ''}`;
        card.innerHTML = `
            <img src="${ep.imagem}" alt="${ep.titulo}" loading="lazy">
            <div class="episodio-info">
                <span class="episodio-data">${ep.data}</span>
                <h3>${ep.titulo}</h3>
                <p class="autor">${ep.autor}</p>
                <p class="duracao">⏱ ${ep.duracao}</p>
                <p class="descricao">${ep.descricao.substring(0, 150)}...</p>
                <div class="episodio-actions">
                    <a href="${ep.audio}" class="btn-play" target="_blank">▶ Ouvir</a>
                    <a href="episodio.html?id=${ep.id}" class="btn-detalhes">Ver Detalhes</a>
                </div>
            </div>
        `;
        
        containerEpisodios.appendChild(card);
    });
    
    // Atualizar paginação
    atualizarPaginacao();
}

// Função para atualizar controles de paginação
function atualizarPaginacao() {
    const totalPaginas = Math.ceil(episodiosOrdenados.length / episodiosPorPagina);
    
    if (paginacao) {
        paginacao.innerHTML = '';
        
        // Botão anterior
        const btnAnterior = document.createElement('a');
        btnAnterior.href = '#';
        btnAnterior.textContent = '<';
        btnAnterior.className = paginaAtual === 1 ? 'disabled' : '';
        btnAnterior.onclick = (e) => {
            e.preventDefault();
            if (paginaAtual > 1) {
                paginaAtual--;
                renderizarEpisodios(paginaAtual);
                window.scrollTo(0, 0);
            }
        };
        paginacao.appendChild(btnAnterior);
        
        // Números das páginas
        for (let i = 1; i <= totalPaginas; i++) {
            const btnPagina = document.createElement('a');
            btnPagina.href = '#';
            btnPagina.textContent = i;
            btnPagina.className = i === paginaAtual ? 'ativo' : '';
            btnPagina.onclick = (e) => {
                e.preventDefault();
                paginaAtual = i;
                renderizarEpisodios(paginaAtual);
                window.scrollTo(0, 0);
            };
            paginacao.appendChild(btnPagina);
        }
        
        // Botão seguinte
        const btnSeguinte = document.createElement('a');
        btnSeguinte.href = '#';
        btnSeguinte.textContent = '>';
        btnSeguinte.className = paginaAtual === totalPaginas ? 'disabled' : '';
        btnSeguinte.onclick = (e) => {
            e.preventDefault();
            if (paginaAtual < totalPaginas) {
                paginaAtual++;
                renderizarEpisodios(paginaAtual);
                window.scrollTo(0, 0);
            }
        };
        paginacao.appendChild(btnSeguinte);
    }
}

// Destaque para o último episódio (primeiro da lista ordenada)
function destacarUltimoEpisodio() {
    const destaqueContainer = document.querySelector('.destaque-episodio') || containerEpisodios;
    const ultimoEpisodio = episodiosOrdenados[0];
    
    if (destaqueContainer && paginaAtual === 1) {
        const destaque = document.createElement('section');
        destaque.className = 'episodio-destaque';
        destaque.innerHTML = `
            <h2>🎙️ Último Episódio</h2>
            <div class="destaque-content">
                <img src="${ultimoEpisodio.imagem}" alt="${ultimoEpisodio.titulo}">
                <div>
                    <h3>${ultimoEpisodio.titulo}</h3>
                    <p>${ultimoEpisodio.descricao}</p>
                    <p><strong>Autor:</strong> ${ultimoEpisodio.autor}</p>
                    <p><strong>Duração:</strong> ${ultimoEpisodio.duracao}</p>
                    <a href="${ultimoEpisodio.audio}" class="btn-play-grande" target="_blank">▶ Ouvir Agora</a>
                </div>
            </div>
        `;
        
        // Inserir antes dos outros episódios
        const primeiraLista = document.querySelector('.episodios-grid') || document.querySelector('main');
        if (primeiraLista) {
            primeiraLista.insertBefore(destaque, primeiraLista.firstChild);
        }
    }
}

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
    renderizarEpisodios(paginaAtual);
    destacarUltimoEpisodio();
});
</script>
