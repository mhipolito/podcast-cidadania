<!DOCTYPE html>
<html lang="pt">
<head>
    <title>€u Falo de Dinheiro — Episódio</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,700,900"> 
    <link rel="stylesheet" href="fonts/icomoon/style.css">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/magnific-popup.css">
    <link rel="stylesheet" href="css/jquery-ui.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mediaelement@4.2.7/build/mediaelementplayer.min.css">

    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .topicos .badge { background: #e94560; color: #fff; padding: 8px 20px; border-radius: 30px; margin: 5px 5px 5px 0; }
        .quiz-item { background: #f8f9fa; padding: 25px; margin: 20px 0; border-radius: 8px; border-left: 5px solid #e94560; }
        .quiz-option { padding: 12px 15px; margin: 8px 0; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; }
        .quiz-option:hover { background: #f1f1f1; }
        .quiz-option.correct { background: #d4edda; border-color: #28a745; }
        .quiz-option.wrong   { background: #f8d7da; border-color: #dc3545; }
        .info-extra { background: #fff3cd; padding: 25px; border-radius: 8px; border-left: 5px solid #ffc107; margin: 30px 0; }

        .podcast-related { transition: all 0.3s; height: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .podcast-related:hover { transform: translateY(-8px); box-shadow: 0 15px 25px rgba(0,0,0,0.15); }
        .podcast-related .image { height: 180px; background-size: cover; background-position: center; }
    </style>
</head>
<body>
  
<div class="site-wrap">

    <!-- Header (igual ao index.html) -->
    <div class="site-mobile-menu">
      <div class="site-mobile-menu-header">
        <div class="site-mobile-menu-close mt-3"><span class="icon-close2 js-menu-toggle"></span></div>
      </div>
      <div class="site-mobile-menu-body"></div>
    </div>

    <header class="site-navbar py-4 absolute transparent" role="banner">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-3" data-aos="fade-down">
            <h1><a href="index.html" class="text-white h2">€u Falo de Dinheiro!</a></h1>
          </div>
          <div class="col-9" data-aos="fade-down">
            <nav class="site-navigation position-relative text-right text-md-right" role="navigation">
              <div class="d-inline-block ml-md-0 mr-auto py-3">
                <a href="#" class="site-menu-toggle js-menu-toggle text-white"><span class="icon-menu h3"></span></a>
              </div>
              <ul class="site-menu js-clone-nav d-none">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Sobre</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <!-- Hero -->
    <div class="site-blocks-cover overlay" style="background-image: url(images/hero_bg_2.jpg);" data-aos="fade" data-stellar-background-ratio="0.5">
      <div class="container">
        <div class="row align-items-center justify-content-center text-center">
          <div class="col-md-10" data-aos="fade-up" data-aos-delay="400">
            <h2 class="text-white font-weight-light mb-3 display-4" id="episodio-titulo">A carregar episódio...</h2>
            <div class="text-white mb-4" id="ep-meta"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="site-section bg-light">
      <div class="container">
        <div class="row">
          <div class="col-md-12">

            <div class="mb-5">
              <audio id="audio-player" controls preload="metadata" style="width:100%;"></audio>
            </div>

            <h4 class="mb-3">Sobre este episódio</h4>
            <p id="episodio-descricao" class="lead">A carregar...</p>

            <h4 class="mt-5 mb-3">Tópicos abordados</h4>
            <div id="episodio-topicos" class="topicos"></div>

            <h4 class="mt-5 mb-3">Participantes</h4>
            <p id="episodio-participantes" class="lead"></p>

            <div id="info-extra-section">
              <h4 class="mt-5 mb-3">Sabias que...</h4>
              <div id="episodio-info-extra" class="info-extra"></div>
            </div>

            <h4 class="mt-5 mb-4">Testa o teu conhecimento</h4>
            <div id="episodio-quiz"></div>

          </div>
        </div>

        <!-- Relacionados -->
        <div class="row mt-5">
          <div class="col-12 text-center mb-5"><h2>Episódios Relacionados</h2></div>
          <div class="row" id="related-episodes"></div>
        </div>
      </div>
    </div>

    <!-- Footer (podes colar o teu footer aqui) -->
    <footer class="site-footer"> ... </footer>
  </div>

  <!-- SCRIPTS - ORDEM IMPORTANTE -->
  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/jquery-migrate-3.0.1.min.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/aos.js"></script>
  <script src="js/mediaelement-and-player.min.js"></script>
  <script src="js/main.js"></script>

  <!-- CARREGA PRIMEIRO O episódios.js -->
  <script src="episodios.js"></script>

  <!-- SCRIPT DE CARREGAMENTO COM DEBUG -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        console.log("=== DEBUG: Página de episódio carregada ===");
        console.log("episodios variável existe?", typeof episodios !== "undefined");
        console.log("Número de episódios:", episodios ? episodios.length : 0);

        const urlParams = new URLSearchParams(window.location.search);
        const id = parseInt(urlParams.get('id'));
        console.log("ID pedido:", id);

        if (!episodios || episodios.length === 0) {
            document.getElementById('episodio-titulo').innerHTML = '<span style="color:red">Erro: Não foi possível carregar os episódios</span>';
            console.error("ERRO: Array 'episodios' não encontrado ou vazio");
            return;
        }

        const ep = episodios.find(e => e.id === id);

        if (!ep) {
            document.getElementById('episodio-titulo').textContent = 'Episódio não encontrado';
            console.error("Episódio com id " + id + " não existe");
            return;
        }

        console.log("Episódio encontrado:", ep.titulo);

        // Preencher página
        document.getElementById('episodio-titulo').textContent = ep.titulo;
        document.getElementById('ep-meta').innerHTML = `<small>Por ${ep.autor} <span class="sep">/</span> ${ep.data} <span class="sep">/</span> ${ep.duracao}</small>`;
        document.getElementById('episodio-descricao').textContent = ep.descricao || '';

        // Áudio
        const audio = document.getElementById('audio-player');
        if (ep.audio) {
            audio.src = ep.audio;
            new MediaElementPlayer('#audio-player', {
                pluginPath: 'https://cdn.jsdelivr.net/npm/mediaelement@4.2.7/build/',
                features: ['playpause','current','progress','duration','volume']
            });
        }

        // Tópicos
        document.getElementById('episodio-topicos').innerHTML = 
            (ep.topicos || []).map(t => `<span class="badge">${t}</span>`).join('');

        // Participantes
        document.getElementById('episodio-participantes').textContent = 
            (ep.participantes || []).join(', ') || ep.autor;

        // Info Extra
        if (ep.infoExtra) {
            document.getElementById('episodio-info-extra').innerHTML = ep.infoExtra;
        } else {
            document.getElementById('info-extra-section').style.display = 'none';
        }

                // ====================== QUIZ - VERSÃO CORRIGIDA ======================
        const quizContainer = document.getElementById('episodio-quiz');
        if (ep.quiz && ep.quiz.length > 0) {
            ep.quiz.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'quiz-item';
                div.innerHTML = `<p><strong>${idx + 1}. ${q.pergunta}</strong></p><div class="quiz-options"></div>`;
                const optionsDiv = div.querySelector('.quiz-options');
                
                q.opcoes.forEach((opcao, i) => {
                    const opt = document.createElement('div');
                    opt.className = 'quiz-option';
                    opt.textContent = opcao;
                    opt.dataset.value = i;
                    
                    opt.addEventListener('click', function() {
                        // Remove marcações anteriores nesta pergunta
                        optionsDiv.querySelectorAll('.quiz-option').forEach(o => {
                            o.classList.remove('correct', 'wrong');
                        });
                        
                        // Marca apenas a opção escolhida
                        const respostaCorreta = q.resposta;
                        
                        if (parseInt(this.dataset.value) === respostaCorreta) {
                            this.classList.add('correct');
                        } else {
                            this.classList.add('wrong');
                        }
                    });
                    
                    optionsDiv.appendChild(opt);
                });
                
                quizContainer.appendChild(div);
            });
        }

        // Relacionados
        const relatedContainer = document.getElementById('related-episodes');
        const relacionados = episodios.filter(e => e.id !== id).slice(0, 3);
        relatedContainer.innerHTML = relacionados.map(rel => `
            <div class="col-md-6 col-lg-4 mb-5">
                <div class="podcast-related bg-white">
                    <div class="image" style="background-image: url('${rel.imagem || 'images/img_1.jpg'}');"></div>
                    <div class="text p-4">
                        <h5><a href="episodio.html?id=${rel.id}" class="text-dark">${rel.titulo}</a></h5>
                        <small class="text-black-opacity-05">Por ${rel.autor} • ${rel.data}</small>
                        <p class="mt-2 small">${(rel.descricao || '').substring(0, 130)}...</p>
                    </div>
                </div>
            </div>
        `).join('');

    });
  </script>
</body>
</html>
